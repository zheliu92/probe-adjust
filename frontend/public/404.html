<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Probe-Adjust</title>
  <script>
    // GitHub Pages SPA redirect — encodes the path and passes it via sessionStorage
    // so that index.html can restore it with React Router.
    var segmentCount = 1; // 1 = repo subpath e.g. /probe-adjust
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
