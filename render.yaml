services:
  - type: web
    name: probe-adjust-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python version — Render requires a fully qualified version here
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./probe_adjust.db
      - key: STORAGE_BACKEND
        value: local
      - key: UPLOAD_DIR
        value: ./uploads
      - key: LOG_DIR
        value: ./logs
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: EXTRA_ORIGINS
        sync: false
